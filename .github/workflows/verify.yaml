name: Verify PR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Run tests & lint
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true

      - name: Check Formatting
        run: |
          if [ -n "$(go fmt ./...)" ]; then
            echo "Go code is not formatted. Run 'go fmt ./...' to format code."
            exit 1
          fi

      - name: Go Vet
        run: go vet ./...

      - name: Run Unit Tests
        run: go test -v ./...

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: helm lint charts/kivert
